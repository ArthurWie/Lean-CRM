name: release

# Push a v* tag (e.g. v0.1.0) → one GitHub Release with two clean-named assets:
#   LeanCRM.dmg (macOS, Apple Silicon) + LeanCRM_Setup.exe (Windows).
# Build-then-rename-then-upload (not tauri-action's auto-upload) so the asset
# names are clean instead of "Lean CRM_0.1.0_aarch64.dmg".
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release with download table
        run: |
          sed "s/{{VERSION}}/${GITHUB_REF_NAME}/g" .github/release-notes.md > notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "Lean CRM ${GITHUB_REF_NAME}" \
            --draft \
            --notes-file notes.md

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend deps
        run: npm install
      # ponytail: unsigned/ad-hoc build — fine for personal use. Add Apple
      # Developer ID + notarization env only if distributing the dmg to others.
      - name: Build app
        run: npm run tauri build
      - name: Rename + upload installer
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            f=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
            cp "$f" LeanCRM.dmg
            gh release upload "$GITHUB_REF_NAME" LeanCRM.dmg --clobber
          else
            f=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
            cp "$f" LeanCRM_Setup.exe
            gh release upload "$GITHUB_REF_NAME" LeanCRM_Setup.exe --clobber
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Undraft the release
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
